apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloud-provisioner.fullname" . }}
  labels:
    app: {{ include "cloud-provisioner.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "cloud-provisioner.fullname" . }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP
