apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloud-provisioner.fullname" . }}
  labels:
    app: {{ include "cloud-provisioner.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "cloud-provisioner.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "cloud-provisioner.fullname" . }}
    spec:
      containers:
        - name: cloud-provisioner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "cloud-provisioner.fullname" . }}-config
            - secretRef:
                name: {{ include "cloud-provisioner.fullname" . }}-secret
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "cloud-provisioner.fullname" . }}-pvc
